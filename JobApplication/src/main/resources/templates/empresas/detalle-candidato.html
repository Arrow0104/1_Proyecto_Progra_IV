<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candidatos — Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" href="../../static/css/app.css"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main class="main-content">
  <h1 class="page-title">Candidatos para el Puesto</h1>
  <p class="text-sec" style="margin-bottom:1.5rem;">
    Puesto: <strong th:text="${puesto.titulo}" class="text-accent">Título</strong>
  </p>

  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>Oferente</th>
        <th>Residencia</th>
        <th>CV</th>
        <th>Acciones</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="o : ${candidatos}">
        <td th:text="${o.nombre}" class="fw-bold">Nombre</td>
        <td th:text="${o.residencia}" class="text-muted">Ciudad</td>
        <td>
          <a th:if="${o.cvPath != null and !#strings.isEmpty(o.cvPath)}"
             th:href="${o.cvPath}" target="_blank" class="btn btn-outline btn-sm">Ver CV</a>
          <span th:if="${o.cvPath == null or #strings.isEmpty(o.cvPath)}"
                class="text-muted" style="font-size:0.85rem;">Sin CV</span>
        </td>
        <td>
          <a th:href="@{/empresa/candidatos/{id}(id=${o.idOferente})}"
             class="btn btn-outline btn-sm">Ver Detalle</a>
        </td>
      </tr>
      <tr th:if="${candidatos == null or candidatos.empty}">
        <td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;">
          No se encontraron candidatos para este puesto.
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-2">
    <a th:href="@{/empresas}" class="btn btn-outline">← Volver a Mis Puestos</a>
  </div>
</main>
<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
