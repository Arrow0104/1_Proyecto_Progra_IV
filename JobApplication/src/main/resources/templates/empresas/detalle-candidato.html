<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Candidatos — Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/app.css}" href="../../static/css/app.css"/>
</head>
<body>
<th:block th:replace="~{fragments/layout :: navbar}"/>
<main class="main-content">
  <h1 class="page-title">Candidatos para el Puesto</h1>
  <p class="text-sec" style="margin-bottom:1.5rem;">
    Puesto: <strong th:text="${puesto.titulo}" class="text-accent">Título</strong>
  </p>

  <div th:if="${param.msg}" class="alert alert-success" th:text="${param.msg}"></div>

  <div class="table-wrapper">
    <table>
      <thead>
      <tr>
        <th>Oferente</th>
        <th>Residencia</th>
        <th>CV</th>
        <th>Habilidades</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="entry : ${candidatosConHabilidades}">
        <!-- entry.key = Oferente, entry.value = List<OferenteCaracteristica> -->
        <td th:text="${entry.key.nombre}" class="fw-bold">Nombre</td>
        <td th:text="${entry.key.residencia}" class="text-muted">Ciudad</td>
        <td>
          <a th:if="${entry.key.cvPath != null and !#strings.isEmpty(entry.key.cvPath)}"
             th:href="${entry.key.cvPath}" target="_blank" class="btn btn-outline btn-sm">Ver CV</a>
          <span th:if="${entry.key.cvPath == null or #strings.isEmpty(entry.key.cvPath)}"
                class="text-muted" style="font-size:0.85rem;">Sin CV</span>
        </td>
        <td>
          <!-- Lista de habilidades del oferente -->
          <div th:if="${!entry.value.isEmpty()}"
               style="display:flex;flex-wrap:wrap;gap:0.3rem;">
            <span th:each="h : ${entry.value}"
                  class="badge badge-info"
                  th:text="${h.caracteristica.nombre} + ' (' + ${h.nivel} + ')'">
              Habilidad
            </span>
          </div>
          <span th:if="${entry.value.isEmpty()}"
                class="text-muted" style="font-size:0.82rem;">Sin habilidades registradas</span>
        </td>
      </tr>
      <tr th:if="${candidatosConHabilidades == null or candidatosConHabilidades.isEmpty()}">
        <td colspan="4" style="text-align:center;color:var(--text-muted);padding:2rem;">
          No se encontraron candidatos para este puesto.
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="mt-2">
    <a th:href="@{/empresas}" class="btn btn-outline">← Volver a Mis Puestos</a>
  </div>
</main>
<th:block th:replace="~{fragments/layout :: footer}"/>
</body>
</html>
