<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Empresa — Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/app.css} " href="../../static/css/app.css"/>
</head>
<body>
<th:block th:replace="~{layout :: navbar}"/>
<main class="main-content">
  <h1 class="page-title">Registro de Empresa</h1>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

  <div class="card" style="max-width:680px;margin:0 auto;">
    <form th:action="@{/registro/empresa}" method="post">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="nombre">Nombre de la Empresa</label>
          <input type="text" id="nombre" name="nombre" class="form-control"
                 placeholder="Mi Empresa S.A." required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono" class="form-control"
                 placeholder="2200-0000" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="correo">Correo Electrónico</label>
          <input type="email" id="correo" name="correo" class="form-control"
                 placeholder="contacto@empresa.com" required/>
        </div>
        <div class="form-group">
          <label class="form-label" for="localizacion">Localización</label>
          <input type="text" id="localizacion" name="localizacion" class="form-control"
                 placeholder="San José, Costa Rica" required/>
        </div>
        <div class="form-group" style="grid-column: 1 / -1;">
          <label class="form-label" for="descripcion">Descripción de la Empresa</label>
          <textarea id="descripcion" name="descripcion" class="form-control"
                    placeholder="Cuéntenos sobre su empresa..." required></textarea>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Mínimo 8 caracteres" minlength="8" required/>
        </div>
      </div>
      <div class="flex gap-1 mt-2">
        <button type="submit" class="btn btn-primary">Registrar Empresa</button>
        <a th:href="@{/}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</main>
<th:block th:replace="~{layout :: footer}"/>
</body>
</html>
