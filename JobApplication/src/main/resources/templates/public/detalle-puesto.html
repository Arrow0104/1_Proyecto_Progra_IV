<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detalle de Puesto — Bolsa de Empleo</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<th:block th:replace="~{layout :: navbar}"/>
<main class="main-content">
  <div th:if="${puesto}" class="card" style="max-width:700px;margin:0 auto;">
    <p class="card-subtitle" style="font-size:1rem;" th:text="${puesto.empresa.nombre}">Empresa</p>
    <h1 style="font-size:1.8rem;margin-bottom:0.5rem;" th:text="${puesto.titulo}">Título</h1>
    <p class="card-salary" th:text="'₡ ' + ${#numbers.formatDecimal(puesto.salario, 1, 'COMMA', 2, 'POINT')}">₡0</p>

    <div style="display:flex;gap:0.5rem;margin-bottom:1.2rem;flex-wrap:wrap;">
      <span th:if="${puesto.tipoPublicacion == 'PUBLICO'}" class="badge badge-info">Público</span>
      <span th:if="${puesto.tipoPublicacion == 'PRIVADO'}" class="badge badge-warning">Privado</span>
      <span th:if="${puesto.estado == 'ACTIVO'}" class="badge badge-success">Activo</span>
      <span th:if="${puesto.estado == 'INACTIVO'}" class="badge badge-danger">Inactivo</span>
    </div>

    <hr class="divider"/>
    <h3 style="margin-bottom:0.75rem;">Descripción</h3>
    <p class="text-sec" th:text="${puesto.descripcion}">Descripción...</p>

    <hr class="divider"/>
    <h3 style="margin-bottom:0.75rem;">Características Requeridas</h3>
    <div class="table-wrapper">
      <table>
        <thead><tr><th>Característica</th><th>Nivel Mínimo Requerido</th></tr></thead>
        <tbody>
        <tr th:each="pc : ${puesto.caracteristicas}">
          <td th:text="${pc.caracteristica.nombre}">Habilidad</td>
          <td><span class="badge badge-info" th:text="${pc.nivelRequerido}">0</span></td>
        </tr>
        <tr th:if="${puesto.caracteristicas == null or puesto.caracteristicas.empty}">
          <td colspan="2" style="text-align:center;color:var(--text-muted);">Sin requisitos específicos</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="mt-3">
      <a th:href="@{/}" class="btn btn-outline">← Volver al Inicio</a>
      <a th:href="@{/puestos/buscar}" class="btn btn-outline" style="margin-left:0.5rem;">Buscar Más Puestos</a>
    </div>
  </div>

  <div th:if="${puesto == null}" class="alert alert-danger">
    Puesto no encontrado o no disponible.
  </div>
</main>
<th:block th:replace="~{layout :: footer}"/>
</body>
</html>
